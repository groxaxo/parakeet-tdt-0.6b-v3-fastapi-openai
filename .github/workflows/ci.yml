name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install lightweight test dependencies
        run: python -m pip install --upgrade pip "numpy<2" pytest pytest-asyncio psutil
      - name: Compile service
        run: python -m compileall -q parakeet_service server.py
      - name: Run unit tests
        run: pytest -q
